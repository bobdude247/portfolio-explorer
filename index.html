<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bobdude247 Projects</title>
    <meta
      name="description"
      content="Central navigation page for bobdude247 hosted GitHub Pages projects."
    />
    <link rel="stylesheet" href="./styles.css?v=20260418-1" />
  </head>
  <body>
    <header class="page-header">
      <h1>bobdude247 Project Explorer</h1>
      <p>
        A central navigation page for hosted project pages.
      </p>
    </header>

    <main>
      <section class="controls" aria-label="Project controls">
        <label for="searchInput" class="sr-only">Search projects</label>
        <input
          id="searchInput"
          type="search"
          placeholder="Search projects..."
          autocomplete="off"
        />
      </section>

      <section id="status" class="status" aria-live="polite">Loading projects...</section>

      <section id="projectsGrid" class="projects-grid" aria-label="Hosted projects"></section>
    </main>

    <template id="projectCardTemplate">
      <article class="project-card">
        <h2 class="project-title"></h2>
        <p class="project-description"></p>
        <div class="project-links">
          <a class="btn primary visit-link" target="_blank" rel="noopener noreferrer">Open App</a>
          <a class="btn secondary repo-link" target="_blank" rel="noopener noreferrer">View Repo</a>
        </div>
      </article>
    </template>

    <script src="./app.js?v=20260418-1" defer></script>
  </body>
</html>
